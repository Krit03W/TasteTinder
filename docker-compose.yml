services:
  taestetinder-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - default

  taestetinder-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    expose:
      - "3000"
    depends_on:
      - taestetinder-backend  # ← แก้ตรงนี้ด้วย
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    name: taestetinder-network
  dokploy-network:
    external: true