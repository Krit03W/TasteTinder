services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - default          # ← อยู่แค่ internal network พอ

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default          # ← คุยกับ backend ผ่าน internal
      - dokploy-network  # ← Traefik เข้าถึงได้

networks:
  default:
    name: taestetinder-network  # ← ชื่อ unique
  dokploy-network:
    external: true